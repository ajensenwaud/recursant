name: "Authentication Agent"
description: "Verifies customer identity using BAN and PIN against the Customer Master system"
version: "1.0.0"
provider:
  name: "Agentic Bank"
  url: "https://agenticbank.example.com"
skills:
  - id: "authenticate-customer"
    name: "Authenticate Customer"
    description: "Verifies a customer's Bank Account Number (BAN) and PIN against the Customer Master system"
    tags: ["authentication", "security", "banking"]
    examples:
      - "Verify customer with BAN 12345678 and PIN 1234"
default_input_modes: ["text"]
default_output_modes: ["text"]
capabilities:
  streaming: false
  push_notifications: false
