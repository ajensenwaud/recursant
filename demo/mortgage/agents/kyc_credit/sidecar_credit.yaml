recursant:
  sidecar:
    port: 9913
    a2a_port: 8453
    agent_port: 5023
    registry_url: "http://registry:5000"
    agent_card_path: "./agent_card.yaml"
    log_level: "info"
    interceptors:
      authentication:
        enabled: true
        schemes: ["mtls", "api_key"]
      authorisation:
        enabled: true
        default_action: deny
      audit:
        enabled: true
    tls:
      cert_path: "/certs/sidecar-credit.pem"
      key_path: "/certs/sidecar-credit-key.pem"
      ca_path: "/certs/ca.pem"
