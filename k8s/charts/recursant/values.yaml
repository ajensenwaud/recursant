## Recursant Helm Chart Values

namespace: recursant

## Container images
## Build locally with: make build
images:
  registry:
    repository: recursant-registry
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: recursant-frontend
    tag: latest
    pullPolicy: IfNotPresent
  testAgent:
    repository: recursant-test-agent
    tag: latest
    pullPolicy: IfNotPresent
  sidecar:
    repository: recursant-sidecar
    tag: latest
    pullPolicy: IfNotPresent
  agentA:
    repository: recursant-agent-a
    tag: latest
    pullPolicy: IfNotPresent
  agentB:
    repository: recursant-agent-b
    tag: latest
    pullPolicy: IfNotPresent
  gateway:
    repository: recursant-gateway
    tag: latest
    pullPolicy: IfNotPresent
  webhook:
    repository: recursant-webhook
    tag: latest
    pullPolicy: IfNotPresent
  mcp:
    repository: recursant-mcp
    tag: latest
    pullPolicy: IfNotPresent

## Registry API
registry:
  replicas: 1
  port: 5000
  nodePort: 30500
  ha:
    enabled: false
    minAvailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  gunicorn:
    workers: 1
    timeout: 300
    workerClass: geventwebsocket.gunicorn.workers.GeventWebSocketWorker

## Registry Frontend
frontend:
  replicas: 1
  port: 80
  servicePort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

## PostgreSQL Database
db:
  replicas: 1
  port: 5432
  storage: 5Gi
  storageClass: ""
  image:
    repository: postgres
    tag: "15-alpine"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  ha:
    enabled: false
    replicas: 3
    operator: zalando
  replication:
    enabled: false
    clusterName: ""
    remoteHost: ""
    remotePort: 30432

## Redis Cache
redis:
  replicas: 1
  port: 6379
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ha:
    enabled: false
    sentinel:
      replicas: 3

## Test Agent
testAgent:
  replicas: 1
  port: 5001
  provider: anthropic
  model: claude-sonnet-4-5-20250929
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Mesh Agents (base demo)
agents:
  enabled: true
  agentA:
    name: "Research Assistant"
    port: 5010
    sidecarPort: 9901
    a2aPort: 8443
  agentB:
    name: "Fact Checker Agent"
    port: 5011
    sidecarPort: 9902
    a2aPort: 8444

## Ingress Gateway
gateway:
  enabled: false
  replicas: 1
  port: 8080
  serviceType: ClusterIP
  rateLimitRpm: 600
  logLevel: info
  authApiKey: ""
  jwtSecret: false
  tls:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Sidecar Injection Webhook
webhook:
  enabled: true
  replicas: 1
  port: 443
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

## Secrets — override at install time with --set or -f secrets.yaml
## These are defaults for local dev only.
secrets:
  dbPassword: registry
  dbUser: registry
  dbName: registry
  secretKey: dev-secret-key-change-in-production
  jwtSecretKey: dev-jwt-secret
  adminUsername: admin
  adminPassword: changeme
  meshApiKey: mesh-dev-key
  anthropicApiKey: ""
  openaiApiKey: ""
  googleApiKey: ""
  moonshotApiKey: ""
  openrouterApiKey: ""
  evalJudgeProvider: openrouter
  # Pin the judge to a specific model — openrouter/auto can pick models
  # with stricter content filters that refuse to score "harmful" prompts
  # (e.g. quoting an election-conspiracy or weapons prompt for evaluation),
  # returning empty content and breaking the JSON parser.
  evalJudgeModel: anthropic/claude-sonnet-4-5
  evalJudgeTemperature: "0.0"
  evalJudgeMaxTokens: "1024"

## Tool Governance — sidecar-enforced tool authorization and egress control
toolGovernance:
  enabled: true
  toolSyncIntervalSeconds: 30

## Kafka — event streaming for observability pipeline
kafka:
  enabled: true
  image:
    repository: apache/kafka
    tag: "3.9.0"
  port: 9092
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1536Mi
  topics:
    - name: mesh.audit
      partitions: 3
    - name: mesh.guardrails
      partitions: 3
    - name: mesh.registrations
      partitions: 1
    - name: mesh.alerts
      partitions: 1
    - name: mesh.cost
      partitions: 1

## Mortgage demo — disabled by default, enable with values-mortgage.yaml
mortgage:
  enabled: false

## Multi-cluster active-active HA — disabled by default
multiCluster:
  enabled: false
  clusterId: "default"
  remoteRegistryUrl: ""
  remoteDbHost: ""
  remoteDbPort: 30432

## Weaviate — vector database for guardrail reference text similarity
weaviate:
  enabled: true
  image: "cr.weaviate.io/semitechnologies/weaviate:1.28.4"
  t2vImage: "cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2"
  storage: "5Gi"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  t2vResources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

## Network Policy — blocks direct agent-to-agent traffic, forcing
## all inter-agent communication through sidecar A2A ports.
## Requires a CNI that supports NetworkPolicy (Calico, Cilium).
## Kind's default kindnet does NOT support NetworkPolicy.
networkPolicy:
  enabled: true
  a2aPortRange:
    start: 8443
    end: 8500

## Ingress (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: recursant.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

