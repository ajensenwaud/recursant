apiVersion: v1
kind: Service
metadata:
  name: {{ include "recursant.fullname" . }}-frontend
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-frontend
spec:
  type: NodePort
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: 80
      nodePort: 30000
      protocol: TCP
      name: http
  selector:
    app: {{ include "recursant.fullname" . }}-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recursant.fullname" . }}-frontend
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ include "recursant.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-frontend
        {{- include "recursant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "recursant.fullname" . }}-frontend-nginx
