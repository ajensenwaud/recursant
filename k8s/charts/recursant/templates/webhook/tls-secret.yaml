{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recursant.fullname" . }}-webhook-tls
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.pem: {{ .Files.Get "certs/webhook/ca.pem" | b64enc | quote }}
  tls.crt: {{ .Files.Get "certs/webhook/tls.crt" | b64enc | quote }}
  tls.key: {{ .Files.Get "certs/webhook/tls.key" | b64enc | quote }}
{{- end }}
