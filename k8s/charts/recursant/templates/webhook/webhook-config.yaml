{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "recursant.fullname" . }}-sidecar-injector
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
webhooks:
  - name: sidecar-injector.recursant.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchLabels:
        recursant.io/sidecar-injection: enabled
    objectSelector:
      matchExpressions:
        - key: recursant.io/sidecar-inject
          operator: Exists
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
    clientConfig:
      service:
        name: {{ include "recursant.fullname" . }}-webhook
        namespace: {{ include "recursant.namespace" . }}
        path: /mutate
        port: 443
      caBundle: {{ .Files.Get "certs/webhook/ca.pem" | b64enc | quote }}
{{- end }}
