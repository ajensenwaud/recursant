apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recursant.secretName" . }}
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  ADMIN_USERNAME: {{ .Values.secrets.adminUsername | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  MESH_API_KEY: {{ .Values.secrets.meshApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | quote }}
  MOONSHOT_API_KEY: {{ .Values.secrets.moonshotApiKey | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  POSTGRES_USER: {{ .Values.secrets.dbUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.dbName | quote }}
  {{- if .Values.db.ha.enabled }}
  DATABASE_URL: "postgresql://{{ .Values.secrets.dbUser }}:{{ .Values.secrets.dbPassword }}@{{ include "recursant.fullname" . }}-db:{{ .Values.db.port }}/{{ .Values.secrets.dbName }}?target_session_attrs=read-write"
  {{- else }}
  DATABASE_URL: "postgresql://{{ .Values.secrets.dbUser }}:{{ .Values.secrets.dbPassword }}@{{ include "recursant.fullname" . }}-db:{{ .Values.db.port }}/{{ .Values.secrets.dbName }}"
  {{- end }}
  REDIS_URL: {{ include "recursant.redisUrl" . | quote }}
