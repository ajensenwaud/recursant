{{- if .Values.mortgage.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-seed-scripts
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  mortgage_seed.py: |
{{ .Files.Get "scripts/mortgage_seed.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-seed
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-mortgage-seed
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-registry
          image: "{{ .Values.images.registry.repository }}:{{ .Values.images.registry.tag }}"
          imagePullPolicy: {{ .Values.images.registry.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for registry to be ready..."
              until python -c "import urllib.request; urllib.request.urlopen('http://{{ include "recursant.fullname" . }}-registry:{{ .Values.registry.port }}/health')" 2>/dev/null; do
                echo "  Registry not ready, retrying in 5s..."
                sleep 5
              done
              echo "Registry is ready!"
      containers:
        - name: mortgage-seed
          image: "{{ .Values.images.registry.repository }}:{{ .Values.images.registry.tag }}"
          imagePullPolicy: {{ .Values.images.registry.pullPolicy }}
          command: ["python", "/scripts/mortgage_seed.py"]
          args:
            - --mesh-api-key
            - $(MESH_API_KEY)
          env:
            - name: REGISTRY_URL
              value: "http://{{ include "recursant.fullname" . }}-registry:{{ .Values.registry.port }}"
            - name: SERVICE_PREFIX
              value: "{{ include "recursant.fullname" . }}-"
            - name: REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: ADMIN_USERNAME
            - name: REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: ADMIN_PASSWORD
            - name: MESH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: MESH_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ include "recursant.fullname" . }}-mortgage-seed-scripts
{{- end }}
