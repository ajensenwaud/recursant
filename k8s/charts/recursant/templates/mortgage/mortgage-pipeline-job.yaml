{{- if .Values.mortgage.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-pipeline-scripts
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "12"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  mortgage_pipeline.py: |
{{ .Files.Get "scripts/mortgage_pipeline.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-pipeline
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "13"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-mortgage-pipeline
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-agents
          image: "{{ .Values.images.registry.repository }}:{{ .Values.images.registry.tag }}"
          imagePullPolicy: {{ .Values.images.registry.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for mortgage agents to be healthy..."
              # Note: KYC runs in the n8n-kyc pod on port 5022; the
              # kyc-credit pod only hosts the Credit agent on port 5023.
              for url in \
                "http://{{ include "recursant.fullname" . }}-agents-customer:5020/health" \
                "http://{{ include "recursant.fullname" . }}-agents-kyc-credit:5023/health" \
                "http://{{ include "recursant.fullname" . }}-agents-core-banking:5024/health"; do
                until python -c "import urllib.request; urllib.request.urlopen('${url}')" 2>/dev/null; do
                  echo "  Waiting for ${url}..."
                  sleep 5
                done
                echo "  ${url} is ready"
              done
              echo "All agents ready!"
      containers:
        - name: mortgage-pipeline
          image: "{{ .Values.images.registry.repository }}:{{ .Values.images.registry.tag }}"
          imagePullPolicy: {{ .Values.images.registry.pullPolicy }}
          command: ["python", "/scripts/mortgage_pipeline.py"]
          args:
            - --skip-governance
          env:
            - name: REGISTRY_URL
              value: "http://{{ include "recursant.fullname" . }}-registry:{{ .Values.registry.port }}"
            - name: REGISTRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: ADMIN_USERNAME
            - name: REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: ADMIN_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: DATABASE_URL
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ include "recursant.fullname" . }}-mortgage-pipeline-scripts
{{- end }}
