{{- if .Values.mortgage.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "recursant.fullname" . }}-agents-compliance
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-agents-compliance
spec:
  ports:
    - port: 5025
      targetPort: 5025
      protocol: TCP
      name: agent
    - port: 9915
      targetPort: 9915
      protocol: TCP
      name: sidecar
    - port: 8455
      targetPort: 8455
      protocol: TCP
      name: a2a
  selector:
    app: {{ include "recursant.fullname" . }}-agents-compliance
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recursant.fullname" . }}-agents-compliance
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-agents-compliance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "recursant.fullname" . }}-agents-compliance
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-agents-compliance
        recursant.io/sidecar-inject: "true"
        {{- include "recursant.labels" . | nindent 8 }}
      annotations:
        recursant.io/inject-sidecar: "true"
        recursant.io/agent-name: "Compliance Crew"
        recursant.io/agent-port: "5025"
        recursant.io/sidecar-port: "9915"
        recursant.io/a2a-port: "8455"
        recursant.io/sidecar-config: {{ include "recursant.fullname" . }}-sidecar-compliance
        recursant.io/cert-secret: {{ include "recursant.fullname" . }}-mortgage-certs
        recursant.io/secret-name: {{ include "recursant.secretName" . }}
        recursant.io/advertise-host: {{ include "recursant.fullname" . }}-agents-compliance
    spec:
      containers:
        - name: agents-compliance
          image: "{{ .Values.images.agentsCompliance.repository }}:{{ .Values.images.agentsCompliance.tag }}"
          imagePullPolicy: {{ .Values.images.agentsCompliance.pullPolicy }}
          ports:
            - containerPort: 5025
              name: agent
          env:
            - name: STUB_API_URL
              value: "http://{{ include "recursant.fullname" . }}-stub-apis:6000"
            - name: LLM_PROVIDER
              value: {{ .Values.mortgage.llmProvider | default "anthropic" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: ANTHROPIC_API_KEY
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: MOONSHOT_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: OPENROUTER_API_KEY
            - name: LLM_MODEL
              value: {{ .Values.mortgage.llmModel | quote }}
            - name: SIDECAR_URL_COMPLIANCE
              value: "http://localhost:9915"
            - name: USE_SIDECAR_TOOLS
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: agent
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: agent
            initialDelaySeconds: 25
            periodSeconds: 5
{{- end }}
