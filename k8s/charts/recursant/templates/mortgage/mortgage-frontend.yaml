{{- if .Values.mortgage.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-nginx
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # WebSocket endpoint — must be BEFORE /api/
        location /api/ws {
            proxy_pass http://{{ include "recursant.fullname" . }}-agents-customer:5020/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/ {
            proxy_pass http://{{ include "recursant.fullname" . }}-agents-customer:5020/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            client_max_body_size 10m;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-frontend
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-mortgage-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "recursant.fullname" . }}-mortgage-frontend
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-mortgage-frontend
        {{- include "recursant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: mortgage-frontend
          image: "{{ .Values.images.mortgageFrontend.repository }}:{{ .Values.images.mortgageFrontend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "recursant.fullname" . }}-mortgage-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "recursant.fullname" . }}-mortgage-frontend
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-mortgage-frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
      protocol: TCP
      name: http
  selector:
    app: {{ include "recursant.fullname" . }}-mortgage-frontend
{{- end }}
