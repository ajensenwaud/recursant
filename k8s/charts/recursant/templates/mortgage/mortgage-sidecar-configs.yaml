{{- if .Values.mortgage.enabled }}
{{- $fullname := include "recursant.fullname" . }}
{{- $registryUrl := printf "http://%s-registry:%v" $fullname .Values.registry.port }}
## Customer Agent sidecar config
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-sidecar-customer
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
data:
  recursant-sidecar.yaml: |
    recursant:
      sidecar:
        port: 9910
        a2a_port: 8450
        agent_port: 5020
        registry_url: {{ $registryUrl | quote }}
        agent_card_path: "./agent_card.yaml"
        log_level: "info"
        tool_sync_interval_seconds: 30
        interceptors:
          authentication:
            enabled: true
            schemes: ["mtls", "api_key"]
          authorisation:
            enabled: true
            default_action: deny
          audit:
            enabled: true
        tls:
          cert_path: "/certs/sidecar-customer.pem"
          key_path: "/certs/sidecar-customer-key.pem"
          ca_path: "/certs/ca.pem"
  agent_card.yaml: |
    name: "Customer Agent"
    description: "Guides customers through the mortgage origination process, coordinating authentication, KYC, credit assessment, and loan disbursement"
    version: "1.0.0"
    provider:
      name: "Agentic Bank"
      url: "https://agenticbank.example.com"
    skills:
      - id: "mortgage-origination"
        name: "Mortgage Origination"
        description: "Guides customers through a complete mortgage application including authentication, identity verification, credit assessment, and loan disbursement"
        tags: ["mortgage", "origination", "banking"]
        examples:
          - "I'd like to apply for a mortgage"
          - "Help me get a home loan"
    default_input_modes: ["text"]
    default_output_modes: ["text"]
    capabilities:
      streaming: true
      push_notifications: false
---
