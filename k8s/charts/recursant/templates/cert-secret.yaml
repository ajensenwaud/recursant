{{- if .Values.agents.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "recursant.fullname" . }}-certs
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
type: Opaque
data:
  ## Populate with base64-encoded cert files from mesh/docker/certs/
  ## At install time, use --set-file or generate via load-secrets.sh
  ## For local dev, the kind-up script loads these automatically.
  ##
  ## Example:
  ##   helm install recursant charts/recursant/ \
  ##     --set-file certs.ca=../mesh/docker/certs/ca.pem \
  ##     --set-file certs.sidecarA=../mesh/docker/certs/sidecar-a.pem \
  ##     ...
  ##
  ## The cert files are loaded from the filesystem at install time.
  ## This template uses .Files.Get to embed them from the chart directory
  ## or falls back to empty values that must be overridden.
  ca.pem: {{ .Files.Get "certs/ca.pem" | b64enc | default "" | quote }}
  ca-key.pem: {{ .Files.Get "certs/ca-key.pem" | b64enc | default "" | quote }}
  sidecar-a.pem: {{ .Files.Get "certs/sidecar-a.pem" | b64enc | default "" | quote }}
  sidecar-a-key.pem: {{ .Files.Get "certs/sidecar-a-key.pem" | b64enc | default "" | quote }}
  sidecar-b.pem: {{ .Files.Get "certs/sidecar-b.pem" | b64enc | default "" | quote }}
  sidecar-b-key.pem: {{ .Files.Get "certs/sidecar-b-key.pem" | b64enc | default "" | quote }}
{{- end }}
