{{- if .Values.registry.ha.enabled }}
# When HA is enabled, migrations run as a separate Job (not init container)
# to ensure only one migration runs even with multiple registry replicas.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "recursant.fullname" . }}-migrate
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.images.registry.repository }}:{{ .Values.images.registry.tag }}"
          imagePullPolicy: {{ .Values.images.registry.pullPolicy }}
          command:
            - sh
            - -c
            - |
              python -c 'from app import create_app, db; app = create_app(); app.app_context().push(); db.create_all()' &&
              flask db stamp head &&
              python scripts/seed_admin_user.py &&
              python scripts/seed_evaluation_suites.py &&
              python scripts/seed_security_tests.py
          env:
            {{- include "recursant.registryEnv" . | nindent 12 }}
  backoffLimit: 3
{{- end }}
