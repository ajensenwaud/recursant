{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "recursant.fullname" . }}-gateway
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-gateway
spec:
  type: {{ .Values.gateway.serviceType | default "ClusterIP" }}
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "recursant.fullname" . }}-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recursant.fullname" . }}-gateway
  namespace: {{ include "recursant.namespace" . }}
  labels:
    {{- include "recursant.labels" . | nindent 4 }}
    app: {{ include "recursant.fullname" . }}-gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: {{ include "recursant.fullname" . }}-gateway
  template:
    metadata:
      labels:
        app: {{ include "recursant.fullname" . }}-gateway
        {{- include "recursant.labels" . | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.images.gateway.repository }}:{{ .Values.images.gateway.tag }}"
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
              name: http
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.gateway.port | quote }}
            - name: GATEWAY_REGISTRY_URL
              value: "http://{{ include "recursant.fullname" . }}-registry:{{ .Values.registry.port }}"
            - name: GATEWAY_REGISTRY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: MESH_API_KEY
            - name: GATEWAY_RATE_LIMIT_RPM
              value: {{ .Values.gateway.rateLimitRpm | default 600 | quote }}
            - name: GATEWAY_LOG_LEVEL
              value: {{ .Values.gateway.logLevel | default "info" | quote }}
            {{- if .Values.gateway.authApiKey }}
            - name: GATEWAY_AUTH_API_KEY
              value: {{ .Values.gateway.authApiKey | quote }}
            {{- end }}
            {{- if .Values.gateway.jwtSecret }}
            - name: GATEWAY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "recursant.secretName" . }}
                  key: JWT_SECRET_KEY
            {{- end }}
          {{- if .Values.gateway.tls.enabled }}
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- if .Values.gateway.tls.enabled }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ include "recursant.fullname" . }}-mesh-certs
      {{- end }}
{{- end }}
