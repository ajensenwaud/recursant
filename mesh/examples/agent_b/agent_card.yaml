name: "Fact Checker Agent"
description: "Verifies factual claims using multiple sources and returns evidence"
version: "1.0.0"
provider:
  name: "Recursant"
  url: "https://recursant.ai"
skills:
  - id: "fact-check"
    name: "Fact Check"
    description: "Verifies a factual claim and returns a verdict with evidence"
    tags: ["verification", "fact-checking", "evidence"]
    examples:
      - "Is the Eiffel Tower 330m tall?"
      - "Did humans land on the Moon in 1969?"
default_input_modes: ["text"]
default_output_modes: ["text"]
capabilities:
  streaming: false
  push_notifications: false
security_schemes:
  mtls:
    type: "mutualTLS"
security:
  - mtls: []
