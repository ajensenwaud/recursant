[pytest]
markers =
    integration: marks tests as integration tests (require docker compose with all services running)
    requires_anthropic: requires ANTHROPIC_API_KEY environment variable
    requires_openai: requires OPENAI_API_KEY environment variable
    requires_google: requires GOOGLE_API_KEY environment variable

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
