<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Gradient for the wave mark -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F9690;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06D6A0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Lighter gradient for second wave layer -->
    <linearGradient id="waveGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06D6A0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0F9690;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Third recursive layer -->
    <linearGradient id="waveGrad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06D6A0;stop-opacity:0.3" />
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="300" fill="#0A0F1C" rx="12"/>
  
  <!-- Subtle grid/mesh pattern in background -->
  <g opacity="0.06" stroke="#14B8A6" stroke-width="0.5" fill="none">
    <line x1="40" y1="60" x2="40" y2="240"/>
    <line x1="70" y1="60" x2="70" y2="240"/>
    <line x1="100" y1="60" x2="100" y2="240"/>
    <line x1="130" y1="60" x2="130" y2="240"/>
    <line x1="160" y1="60" x2="160" y2="240"/>
    <line x1="190" y1="60" x2="190" y2="240"/>
    <line x1="40" y1="90" x2="190" y2="90"/>
    <line x1="40" y1="120" x2="190" y2="120"/>
    <line x1="40" y1="150" x2="190" y2="150"/>
    <line x1="40" y1="180" x2="190" y2="180"/>
    <line x1="40" y1="210" x2="190" y2="210"/>
  </g>
  
  <!-- ICON: Recursive wave mark -->
  <!-- Wave 1 - Primary, boldest -->
  <path d="M 50 170 
           C 70 110, 90 110, 110 150 
           C 130 190, 150 190, 170 130
           " 
        fill="none" stroke="url(#waveGrad)" stroke-width="5" stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Wave 2 - Offset, medium opacity (recursive echo) -->
  <path d="M 58 175 
           C 78 118, 98 118, 118 155 
           C 138 192, 158 192, 178 138
           " 
        fill="none" stroke="url(#waveGrad2)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Wave 3 - Further offset, lightest (deepest recursion) -->
  <path d="M 66 180 
           C 86 126, 106 126, 126 160 
           C 146 194, 166 194, 186 146
           " 
        fill="none" stroke="url(#waveGrad3)" stroke-width="3" stroke-linecap="round"/>

  <!-- Mesh connection nodes -->
  <circle cx="110" cy="150" r="3.5" fill="#14B8A6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="118" cy="155" r="2.5" fill="#06D6A0" opacity="0.6"/>
  <circle cx="126" cy="160" r="1.8" fill="#06D6A0" opacity="0.35"/>
  
  <!-- Recursion arrow hint - small spiral at the end -->
  <path d="M 170 130 C 175 125, 180 128, 178 134 C 176 138, 172 136, 173 132" 
        fill="none" stroke="url(#waveGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- WORDMARK -->
  <text x="230" y="168" 
        font-family="'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif" 
        font-size="56" 
        font-weight="300" 
        letter-spacing="6"
        fill="#E8F4F2">RECURSANT</text>
  
  <!-- Tagline -->
  <text x="234" y="200" 
        font-family="'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif" 
        font-size="18" 
        font-weight="400" 
        letter-spacing="4"
        fill="#14B8A6"
        opacity="0.7">AGENTIC AI MESH PLATFORM</text>

</svg>
