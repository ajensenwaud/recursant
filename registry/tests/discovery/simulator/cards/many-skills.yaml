    name: Text Classification
    description: Classify text into predefined categories.
    tags:
      - nlp
      - classification
  - id: skill-02
    name: Sentiment Analysis
    description: Determine sentiment polarity of text input.
    tags:
      - nlp
      - sentiment
  - id: skill-03
    name: Named Entity Recognition
    description: Extract named entities such as people, organizations, and locations.
    tags:
      - nlp
      - ner
  - id: skill-04
    name: Text Summarization
    description: Generate concise summaries of long documents.
    tags:
      - nlp
      - summarization
