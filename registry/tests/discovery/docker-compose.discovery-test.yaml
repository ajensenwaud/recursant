version: '3.8'

networks:
  discovery-subnet-a:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
  discovery-subnet-b:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.2.0/24
  discovery-subnet-c:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.3.0/24
  discovery-subnet-d:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.4.0/24
  discovery-subnet-e:
    driver: bridge
    ipam:
