      - hypothesis-testing
  - id: clean-data
    name: Clean Data
    description: Detect and handle missing values, duplicates, and type inconsistencies in datasets.
    tags:
      - data-cleaning
      - etl
  - id: feature-engineering
    name: Feature Engineering
    description: Create derived features from raw data to improve model performance.
    tags:
      - feature-engineering
      - ml-prep
