    description: Perform exploratory data analysis including distributions, correlations, and outlier detection.
    tags:
      - eda
      - statistics
  - id: visualize
    name: Visualize
    description: Generate charts and plots from tabular data.
    tags:
      - visualization
      - charts
  - id: hypothesis-test
    name: Hypothesis Testing
    description: Run statistical hypothesis tests such as t-test, chi-squared, and ANOVA.
